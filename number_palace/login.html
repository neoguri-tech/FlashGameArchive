<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>러닝 숫자야구 - 로그인</title>
  <link rel="stylesheet" href="src/ui/styles.css" />
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
        "firebase/analytics": "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
      }
    }
  </script>
  <style>
    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-box {
      background: rgba(24, 27, 32, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: var(--shadow);
      border-radius: 12px;
      padding: 48px 36px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .login-box h1 {
      margin-bottom: 8px;
    }
    .login-desc {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #ffffff;
      color: #3c4043;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 800;
      font-size: 15px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
    }
    .google-btn:hover {
      background: #f8f9fa;
      box-shadow: 0 1px 3px rgba(60,64,67, 0.3);
    }
    .google-btn:active {
      transform: scale(0.98);
    }
    .google-btn svg {
      width: 24px;
      height: 24px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div>
        <p class="kicker">Running Baseball</p>
        <h1>러닝 숫자야구</h1>
      </div>
      <p class="login-desc">
        게임을 플레이하고 기록을 저장하려면<br>
        구글 계정으로 로그인해 주세요.
      </p>
      
      <button id="googleLoginBtn" class="google-btn" type="button">
        <svg viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Google 계정으로 시작하기
      </button>
    </div>
  </div>

  <script type="module">
    import FirebaseApi from './src/firebase/firebaseApi.js';
    
    const loginBtn = document.getElementById('googleLoginBtn');
    
    // 이미 실제 계정으로 로그인되어 있으면 로비 화면으로 리다이렉트
    FirebaseApi.onAuthStateChanged((user) => {
      if (user && !user.isAnonymous) {
        window.location.replace('lobby.html');
      }
    });

    loginBtn.addEventListener('click', async () => {
      try {
        await FirebaseApi.signInWithGoogle();
        // 로그인 성공 시 onAuthStateChanged에 의해 자동으로 index.html로 리다이렉트됨
      } catch (error) {
        console.error('로그인 에러:', error);
        // 사용자 취소 시 에러 무시
        if (error.code !== 'auth/popup-closed-by-user') {
          alert('로그인에 실패했습니다. 다시 시도해주세요.');
        }
      }
    });
  </script>
</body>
</html>
