<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>인피니트 슬래셔</title>
    <link rel="stylesheet" href="styles.css?v=infinite-slasher-title-1" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <a class="home-link" href="../../index.html" aria-label="홈으로 이동">
          <span aria-hidden="true">N</span>
          <strong>네오구리</strong>
        </a>
        <div class="title-block">
          <p>Infinite Slasher</p>
          <h1 class="stacked-title">
            <span>인피니트</span>
            <span>슬래셔</span>
          </h1>
        </div>
        <section class="stats" aria-label="게임 상태">
          <span>점수 <strong id="scoreValue">0</strong></span>
          <span>콤보 <strong id="comboValue">0</strong></span>
          <span>맥스 <strong id="maxComboValue">0</strong></span>
          <span>벽 <strong id="wallValue">0</strong></span>
          <span>시간 <strong id="timeValue">0.0초</strong></span>
          <span>최고 <strong id="bestValue">0</strong></span>
        </section>
      </header>

      <section class="stage" aria-label="인피니트 슬래셔 게임">
        <canvas id="gameCanvas" width="960" height="640" aria-label="밀려오는 벽의 틈새를 검으로 베는 게임 화면"></canvas>

        <div id="startPanel" class="start-panel">
          <div class="start-card lobby-card">
            <p>Infinite Slasher</p>
            <h2 class="stacked-title">
              <span>인피니트</span>
              <span>슬래셔</span>
            </h2>
            <div class="lobby-layout">
              <figure class="lobby-preview">
                <img id="backgroundPreview" src="assets/backgrounds/trial-chamber.png" alt="" />
                <figcaption id="backgroundName">검의 시험장</figcaption>
              </figure>
              <div class="background-select" aria-label="수련장 선택">
                <button class="background-option" data-bg="trial" type="button" aria-pressed="true">
                  <img src="assets/backgrounds/trial-chamber.png" alt="" />
                  <span>검의 시험장</span>
                </button>
                <button class="background-option" data-bg="arena" type="button" aria-pressed="false">
                  <img src="assets/backgrounds/dueling-arena.png" alt="" />
                  <span>지하 검투장</span>
                </button>
                <button class="background-option" data-bg="hall" type="button" aria-pressed="false">
                  <img src="assets/backgrounds/training-hall.png" alt="" />
                  <span>석벽 수련장</span>
                </button>
                <button class="background-option" data-bg="temple" type="button" aria-pressed="false">
                  <img src="assets/backgrounds/cliff-temple.png" alt="" />
                  <span>절벽 사원</span>
                </button>
              </div>
            </div>
            <button id="startButton" type="button">시작</button>
          </div>
        </div>

        <div id="gameOverPanel" class="start-panel" hidden>
          <div class="start-card result-card">
            <p>Result</p>
            <h2 id="resultTitle">벽에 막혔습니다</h2>
            <strong id="resultScore">0</strong>
            <button id="restartButton" type="button">다시</button>
          </div>
        </div>

        <div class="pad" aria-label="방향 입력">
          <span aria-hidden="true"></span>
          <button data-dir="U" type="button" aria-label="위">↑</button>
          <span aria-hidden="true"></span>
          <button data-dir="L" type="button" aria-label="왼쪽">←</button>
          <span aria-hidden="true"></span>
          <button data-dir="R" type="button" aria-label="오른쪽">→</button>
          <span aria-hidden="true"></span>
          <button data-dir="D" type="button" aria-label="아래">↓</button>
          <span aria-hidden="true"></span>
        </div>
      </section>

      <p id="messageText" class="message" aria-live="polite">-</p>
    </main>

    <script src="game.js?v=infinite-slasher-title-1"></script>
  </body>
</html>
