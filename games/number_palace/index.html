<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>러닝 숫자야구</title>
  <link rel="stylesheet" href="src/ui/styles.css?v=20260531-ship-player-1" />
  <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
          "firebase/analytics": "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"
        }
      }
    </script>
</head>

<body>
  <main class="app-shell">
    <section class="game-surface" aria-label="러닝 숫자야구 게임 화면">
      <canvas id="gameCanvas" width="560" height="1040"></canvas>
      <div class="touch-controls" aria-label="터치 조작">
        <button type="button" data-action="left" aria-label="왼쪽 레인">←</button>
        <button type="button" data-action="dash" aria-label="대쉬">▲</button>
        <button type="button" data-action="right" aria-label="오른쪽 레인">→</button>
      </div>
    </section>

    <aside class="side-panel" aria-label="게임 정보">
      <button id="devToggleButton" class="dev-toggle" type="button" aria-controls="devDrawer" aria-expanded="false"
        aria-label="개발 메뉴">⚙</button>

      <section class="status-block live-overlay play-stats">
        <h2>플레이 상태</h2>
        <div class="stat-grid compact">
          <div class="stat-card">
            <span>경과</span>
            <strong id="timeValue">00:00.0</strong>
          </div>
          <div class="stat-card">
            <span>남은시간</span>
            <strong id="remainingTimeValue">02:00.0</strong>
          </div>
          <div class="stat-card">
            <span>점수</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div class="stat-card">
            <span>세트</span>
            <strong id="clearedSetsValue">0</strong>
          </div>
          <div class="stat-card">
            <span>부스트</span>
            <strong id="boostValue">0</strong>
          </div>
          <div class="stat-card">
            <span>현재속도</span>
            <strong id="speedValue">x1.00</strong>
          </div>
          <div class="stat-card next-card">
            <span>다음 숫자</span>
            <strong id="nextDigitsValue" class="next-digits"><span>.</span><span>.</span><span>.</span></strong>
          </div>
          <div class="stat-card">
            <span>힌트</span>
            <strong id="hintProgressValue">0/3</strong>
          </div>
          <div class="stat-card">
            <span>아닌 숫자</span>
            <strong id="excludedDigitsValue">-</strong>
          </div>
        </div>
      </section>

      <section class="status-block live-overlay history-overlay">
        <h2>결과 (S 순)</h2>
        <ol id="historyList" class="history-list" aria-live="polite"></ol>
      </section>

      <div id="devDrawer" class="dev-drawer" hidden>
        <div class="panel-top">
          <div>
            <p class="kicker">Running Baseball</p>
            <h1>러닝 숫자야구</h1>
          </div>
          <div class="panel-actions">
            <button id="lobbyButton" type="button">로비</button>
            <button id="pauseButton" type="button">정지</button>
            <button id="deathButton" type="button">죽음</button>
            <button id="restartButton" type="button">새 게임</button>
          </div>
        </div>

        <section class="status-block">
          <h2>현재 추측</h2>
          <div id="guessSlots" class="guess-slots" aria-live="polite"></div>
        </section>

        <details class="qa-panel" open>
          <summary>QA 조절</summary>
          <div class="dev-secret">
            <span>정답</span>
            <strong id="devSecretValue">...</strong>
          </div>
          <div class="qa-grid">
            <label>
              <span>난이도</span>
              <select id="qaDifficulty">
                <option value="5">Easy 1-5</option>
                <option value="7" selected>Normal 1-7</option>
                <option value="9">Hard 1-9</option>
              </select>
              <strong id="qaDifficultyValue">1-7</strong>
            </label>
            <label>
              <span>중복</span>
              <input id="qaAllowDuplicates" type="checkbox" />
              <strong id="qaAllowDuplicatesValue">OFF</strong>
            </label>
            <label>
              <span>제한시간</span>
              <input id="qaTimeLimit" type="range" min="60" max="600" step="30" value="120" />
              <strong id="qaTimeLimitValue">2:00</strong>
            </label>
            <label>
              <span>낙하속도</span>
              <input id="qaBaseSpeed" type="range" min="140" max="460" value="255" />
              <strong id="qaBaseSpeedValue">255</strong>
            </label>
            <label>
              <span>빈칸 가속</span>
              <input id="qaBoostGain" type="range" min="0" max="80" value="33" />
              <strong id="qaBoostGainValue">0.33</strong>
            </label>
            <label>
              <span>최대속도</span>
              <input id="qaSpeedCap" type="range" min="180" max="350" value="265" />
              <strong id="qaSpeedCapValue">2.65</strong>
            </label>
            <label>
              <span>숫자 크기</span>
              <input id="qaItemSize" type="range" min="46" max="76" value="60" />
              <strong id="qaItemSizeValue">60</strong>
            </label>
            <label>
              <span>캐릭터</span>
              <input id="qaPlayerScale" type="range" min="75" max="110" value="90" />
              <strong id="qaPlayerScaleValue">0.90</strong>
            </label>
            <label>
              <span>만점추측</span>
              <input id="qaScoreGraceGuesses" type="range" min="1" max="10" value="4" />
              <strong id="qaScoreGraceGuessesValue">4</strong>
            </label>
            <label>
              <span>연출 강도</span>
              <input id="qaEffectIntensity" type="range" min="0" max="100" value="55" />
              <strong id="qaEffectIntensityValue">0.55</strong>
            </label>
            <label>
              <span>흔들림</span>
              <input id="qaShakeIntensity" type="range" min="0" max="100" value="45" />
              <strong id="qaShakeIntensityValue">0.45</strong>
            </label>
            <label>
              <span>속도감</span>
              <input id="qaBoostMotion" type="range" min="0" max="100" value="50" />
              <strong id="qaBoostMotionValue">0.50</strong>
            </label>
          </div>
        </details>
      </div>
    </aside>
  </main>

  <script defer src="src/core/game-core.js?v=20260531-ship-player-1"></script>
  <script defer src="src/game/config.js?v=20260531-ship-player-1"></script>
  <script defer src="src/game/audio.js?v=20260531-ship-player-1"></script>
  <script defer src="src/game/effects.js?v=20260531-ship-player-1"></script>
  <script defer src="src/ui/hud.js?v=20260531-ship-player-1"></script>
  <script defer src="src/ui/dev-controls.js?v=20260531-ship-player-1"></script>
  <script defer src="src/rendering/canvas-renderer.js?v=20260531-ship-player-1"></script>
  <script defer src="src/game/game.js?v=20260531-ship-player-1"></script>
  <script type="module">
    async function bootstrapFirebase() {
      if (window.location.protocol === 'file:') {
        console.warn('Firebase 로그인은 로컬 서버(http://127.0.0.1:5500/)에서만 실행됩니다.');
        return;
      }

      try {
        const { default: FirebaseApi } = await import('./src/firebase/firebaseApi.js');

        FirebaseApi.onAuthStateChanged(() => {
          // 로그인은 선택 사항입니다. 미로그인 상태에서도 로컬 플레이는 계속 가능합니다.
        });
      } catch (error) {
        console.error("Firebase 초기화 실패", error);
      }
    }

    bootstrapFirebase();

    // 로비로 돌아가기
    const lobbyBtn = document.getElementById('lobbyButton');
    if (lobbyBtn) {
      lobbyBtn.addEventListener('click', () => {
        window.location.href = 'lobby.html';
      });
    }

    const devToggleButton = document.getElementById('devToggleButton');
    const devDrawer = document.getElementById('devDrawer');
    if (devToggleButton && devDrawer) {
      function setDevDrawerOpen(open) {
        devDrawer.hidden = !open;
        devToggleButton.setAttribute('aria-expanded', String(open));
      }

      devToggleButton.addEventListener('click', () => {
        setDevDrawerOpen(devDrawer.hidden);
      });

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          setDevDrawerOpen(false);
        }
      });
    }
  </script>
</body>

</html>
