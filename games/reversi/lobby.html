<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리버시 랩 - 로비</title>
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
          "firebase/analytics": "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"
        }
      }
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell lobby-shell">
      <header class="game-header">
        <a class="home-link" href="../../index.html" aria-label="홈으로 이동">
          <span aria-hidden="true">N</span>
          <strong>네오구리</strong>
        </a>
        <div class="title-block">
          <p>Reversi Lab</p>
          <h1>게임 로비</h1>
        </div>
      </header>

      <section class="lobby-layout">
        <form id="lobbyForm" class="lobby-panel">
          <fieldset>
            <legend>플레이 방식</legend>
            <div class="option-grid three">
              <label class="option-tile">
                <input type="radio" name="mode" value="cpu" checked />
                <span>VS 컴퓨터</span>
              </label>
              <label class="option-tile">
                <input type="radio" name="mode" value="local" />
                <span>로컬 2인</span>
              </label>
              <label class="option-tile">
                <input type="radio" name="mode" value="online" />
                <span>온라인</span>
              </label>
            </div>
          </fieldset>

          <fieldset>
            <legend>내 색</legend>
            <div class="option-grid two">
              <label class="option-tile">
                <input type="radio" name="player" value="black" checked />
                <span>흑</span>
              </label>
              <label class="option-tile">
                <input type="radio" name="player" value="white" />
                <span>백</span>
              </label>
            </div>
          </fieldset>

          <fieldset id="difficultyField">
            <legend>컴퓨터</legend>
            <select id="difficultySelect" name="difficulty">
              <option value="easy" selected>입문</option>
              <option value="greedy">욕심쟁이</option>
              <option value="positional">전략가</option>
              <option value="minimax3">수읽기</option>
              <option value="minimax4">고수</option>
            </select>
          </fieldset>

          <fieldset id="onlineField" hidden>
            <legend>온라인 방</legend>
            <div class="online-auth-row">
              <span id="onlineAuthText">로그인 확인 중</span>
              <button id="onlineLoginButton" type="button">Google 로그인</button>
            </div>
            <div class="room-code-row">
              <input id="roomCodeInput" name="room" type="text" autocomplete="off" inputmode="latin" placeholder="초대 코드 입력" />
            </div>
            <p id="onlineHelpText">빈칸으로 시작하면 새 방을 만들고, 코드를 입력하면 그 방에 참가합니다.</p>
          </fieldset>

          <fieldset>
            <legend>랜덤 금지칸</legend>
            <div class="range-row">
              <input id="blockedInput" name="blocked" type="range" min="0" max="14" step="1" value="4" />
              <strong id="blockedValue">4</strong>
            </div>
          </fieldset>

          <fieldset>
            <legend>특수 룰</legend>
            <label class="option-tile chaos-toggle">
              <input id="chaosInput" type="checkbox" name="chaos" value="1" checked />
              <span>카오스 카드</span>
            </label>
            <div class="field-help-row">
              <p id="chaosHelpText" class="field-help">숨겨진 초능력 1장과 특수돌 1장을 받고 시작합니다.</p>
              <button id="chaosGuideButton" class="inline-help-button" type="button">목록 보기</button>
            </div>
          </fieldset>

          <div class="lobby-actions">
            <button class="primary-action" type="submit">시작</button>
            <a class="secondary-action" href="../../index.html">홈</a>
          </div>
        </form>

        <aside class="lobby-side">
          <section class="lobby-preview" aria-label="선택한 설정">
            <div class="mini-board" aria-hidden="true">
              <span class="mini-piece mini-white p1"></span>
              <span class="mini-piece mini-black p2"></span>
              <span class="mini-piece mini-black p3"></span>
              <span class="mini-piece mini-white p4"></span>
              <span class="mini-block b1"></span>
              <span class="mini-block b2"></span>
            </div>
            <dl>
              <div>
                <dt>진행</dt>
                <dd id="summaryMode">VS 컴퓨터</dd>
              </div>
              <div>
                <dt>내 색</dt>
                <dd id="summaryPlayer">흑</dd>
              </div>
              <div>
                <dt>컴퓨터</dt>
                <dd id="summaryDifficulty">입문</dd>
              </div>
              <div>
                <dt>금지칸</dt>
                <dd id="summaryBlocked">4</dd>
              </div>
              <div>
                <dt>특수 룰</dt>
                <dd id="summaryChaos">카오스 카드</dd>
              </div>
            </dl>
          </section>

          <section class="leaderboard-panel" aria-label="리버시 리더보드">
            <div class="panel-heading">
              <h2>VS 컴퓨터 최고 승리</h2>
              <span id="leaderboardStatus">로딩 중</span>
            </div>
            <ol id="leaderboardList" class="leaderboard-list">
              <li>기록을 불러오는 중</li>
            </ol>
          </section>
        </aside>
      </section>
    </main>

    <dialog id="chaosGuideDialog" class="chaos-guide-dialog" aria-labelledby="chaosGuideTitle">
      <div class="chaos-guide">
        <header class="chaos-guide-header">
          <div>
            <span>Chaos Cards</span>
            <h2 id="chaosGuideTitle">카오스 카드 목록</h2>
          </div>
          <button id="chaosGuideCloseButton" class="dialog-close-button" type="button" aria-label="닫기">×</button>
        </header>
        <div class="chaos-guide-tabs" role="tablist" aria-label="카오스 카드 종류">
          <button id="powerTabButton" type="button" role="tab" aria-selected="true" aria-controls="chaosGuideList" data-guide-tab="powers">
            초능력
          </button>
          <button id="stoneTabButton" type="button" role="tab" aria-selected="false" aria-controls="chaosGuideList" data-guide-tab="stones">
            특수돌
          </button>
        </div>
        <div id="chaosGuideList" class="chaos-guide-list" role="tabpanel" aria-labelledby="powerTabButton"></div>
      </div>
    </dialog>

    <script>
      const GAME_ID = "reversi";
      const LEADERBOARD_ID = "cpu_best_win";
      const form = document.querySelector("#lobbyForm");
      const blockedInput = document.querySelector("#blockedInput");
      const blockedValue = document.querySelector("#blockedValue");
      const difficultySelect = document.querySelector("#difficultySelect");
      const difficultyField = document.querySelector("#difficultyField");
      const onlineField = document.querySelector("#onlineField");
      const onlineAuthText = document.querySelector("#onlineAuthText");
      const onlineLoginButton = document.querySelector("#onlineLoginButton");
      const onlineHelpText = document.querySelector("#onlineHelpText");
      const roomCodeInput = document.querySelector("#roomCodeInput");
      const chaosInput = document.querySelector("#chaosInput");
      const chaosHelpText = document.querySelector("#chaosHelpText");
      const chaosGuideButton = document.querySelector("#chaosGuideButton");
      const chaosGuideDialog = document.querySelector("#chaosGuideDialog");
      const chaosGuideCloseButton = document.querySelector("#chaosGuideCloseButton");
      const chaosGuideList = document.querySelector("#chaosGuideList");
      const guideTabButtons = [...document.querySelectorAll("[data-guide-tab]")];
      const summaryMode = document.querySelector("#summaryMode");
      const summaryPlayer = document.querySelector("#summaryPlayer");
      const summaryDifficulty = document.querySelector("#summaryDifficulty");
      const summaryBlocked = document.querySelector("#summaryBlocked");
      const summaryChaos = document.querySelector("#summaryChaos");
      const leaderboardStatus = document.querySelector("#leaderboardStatus");
      const leaderboardList = document.querySelector("#leaderboardList");
      const difficultyNames = {
        easy: "입문",
        greedy: "욕심쟁이",
        positional: "전략가",
        minimax3: "수읽기",
        minimax4: "고수",
      };
      const chaosGuide = {

            note: "한 구역을 통째로 뒤흔드는 광역 반전입니다.",

            note: "구멍과 흡입이 동시에 터지는 공간 붕괴형 능력입니다.",

          {

            note: "평범한 착수가 갑자기 큰 파동으로 번질 수 있습니다.",
          },
          {
            id: "comeback_swing",
            name: "역전세",

            note: "일방적으로 터진 판을 한 번 더 붙잡는 역전 카드입니다.",
          },
          {
            id: "move_ban",
            name: "착수 봉인",
            glyph: "ban",
            accent: "red",
            effectType: "ban",
            effect: "상대의 좋은 다음 수를 봉인하고, 봉인된 칸 주변 상대 돌을 균열 반전합니다.",
            note: "상대 선택지를 줄이면서 보드에도 즉시 흔적을 남깁니다.",
          },
          {
            id: "destiny_move",

            glyph: "destiny",

            effectType: "destiny",
            effect: "내 비가장자리 돌 하나에 운명 표식과 보호막을 붙이고, 종료 시 최종 소유자가 +8점을 얻습니다.",
            note: "보드 위에 지켜야 할 큰 쟁탈 목표가 생깁니다.",
          },
          {

            note: "상대가 뭉쳐 있을수록 한 번에 크게 터집니다.",
          },
          {

            effectType: "wave",
            effect: "가장자리의 상대 돌을 최대 4개까지 파도처럼 쓸어와 내 색으로 바꿉니다.",
            note: "가장자리 싸움을 한순간에 뒤집는 압박형 능력입니다.",

            note: "돌이 모여 있는 곳에 중력장이 내려앉습니다.",
          },
          {
            id: "tidal_wave",
            name: "해일",
            glyph: "tidal-wave",
            accent: "cyan",
            effectType: "wave",
            effect: "한 행 또는 열의 상대 돌을 파도처럼 밀어내며 한꺼번에 가져옵니다.",
            note: "직선 라인을 시원하게 쓸어내는 대형 반전입니다.",
          },
        ],
        stones: [
          {
            id: "domino",
            name: "도미노돌",
            glyph: "domino",
            accent: "green",
            effect: "착수로 뒤집은 라인 뒤쪽 상대 돌까지 최대 4개 줄줄이 연쇄 반전합니다.",
            note: "라인이 길게 이어질수록 넘어가는 맛이 커집니다.",
          },
          {
            id: "jackpot",
            name: "잭팟돌",
            glyph: "jackpot",
            accent: "amber",
            effect: "놓는 순간 작은 당첨이 터지고, 다음 턴 주변 상대 돌을 크게 가져옵니다.",
            note: "터지기 전 1회 보호가 붙어 보상을 빼앗기기 어렵습니다.",
          },
          {
            id: "throne",
            name: "왕좌돌",
            glyph: "throne",
            accent: "gold",
            effect: "보호막과 호위 반전을 얻고, 가장자리에 끝까지 남으면 최종 소유자가 보너스를 얻습니다.",
            note: "왕관이 박힌 거점형 특수돌이라 어디에 둬도 기본 보상이 있습니다.",
          },
          {
            id: "magnet",
            name: "자석돌",
            glyph: "magnet",
            accent: "cyan",
            effect: "8방향의 먼 상대 돌을 끌어당겨 내 색으로 만들고 1회 보호합니다.",
            note: "자기장에 걸린 돌들이 한꺼번에 끌려옵니다.",
          },
          {
            id: "king_bomb",
            name: "대폭발돌",
            glyph: "mushroom-cloud",
            accent: "red",
            effect: "놓는 즉시 행과 열의 상대 돌을 크게 반전하고, 뒤집히면 한 번 더 폭발 파동이 퍼집니다.",
            note: "버섯구름처럼 크게 터지는 십자 폭발형 돌입니다.",
          },
          {
            id: "mirror_stone",
            name: "거울돌",
            glyph: "mirror",
            accent: "violet",
            effect: "대칭 위치와 착수 지점 주변의 상대 돌을 최대 4개 함께 반전합니다.",
            note: "놓은 곳의 반대편에서 거울상이 같이 흔들립니다.",
          },
          {
            id: "laser_stone",
            name: "레이저돌",
            glyph: "laser",
            accent: "cyan",
            effect: "8방향 광선이 라인을 관통하며 상대 돌을 대량 반전하고 보호합니다.",
            note: "돌 위에서 빛줄기가 뻗어 나가는 저격형 돌입니다.",
          },
          {
            id: "assassin_stone",
            name: "암살돌",
            glyph: "assassin",
            accent: "red",
            effect: "3칸 거리 안의 고가치 상대 돌을 골라 암살하듯 반전합니다.",
            note: "멀리 떨어진 핵심 돌을 조용히 잘라냅니다.",
          },
          {
            id: "split_stone",
            name: "분열돌",
            glyph: "split",
            accent: "green",
            effect: "주변 빈칸에 내 돌을 복제하고 파편으로 주변 상대 돌도 살짝 반전합니다.",
            note: "작은 군집을 순식간에 만들어내는 증식형 돌입니다.",
          },
          {
            id: "vampire_stone",
            name: "흡혈돌",
            glyph: "vampire",
            accent: "red",
            effect: "뒤집은 만큼 주변 상대 돌을 최대 5개까지 흡혈하듯 가져오고, 대상이 없으면 보호막을 얻습니다.",
            note: "많이 뒤집을수록 더 배부르게 빨아들이고 헛발동 부담도 줄었습니다.",
          },
        ],
      };
      let onlineUser = null;
      let onlineAuthReady = false;
      let activeGuideTab = "powers";

      const initialRoomCode = new URLSearchParams(window.location.search).get("room");
      if (initialRoomCode) {
        form.elements.mode.value = "online";
        roomCodeInput.value = normalizeRoomCode(initialRoomCode);
      }

      function getFormValue(name) {
        return new FormData(form).get(name);
      }

      function normalizeRoomCode(value) {
        return String(value ?? "")
          .trim()
          .replace(/\s+/g, "")
          .toUpperCase();
      }

      function syncLobby() {
        const mode = getFormValue("mode");
        const player = getFormValue("player");
        const blocked = blockedInput.value;
        const onlineSelected = mode === "online";
        const chaosAvailable = !onlineSelected;

        difficultyField.hidden = mode !== "cpu";
        onlineField.hidden = !onlineSelected;
        chaosInput.disabled = !chaosAvailable;
        if (!chaosAvailable) {
          chaosInput.checked = false;
        }
        blockedValue.textContent = blocked;
        summaryMode.textContent =
          mode === "cpu" ? "VS 컴퓨터" : mode === "online" ? "온라인" : "로컬 2인";
        summaryPlayer.textContent = player === "black" ? "흑" : "백";
        summaryDifficulty.textContent = mode === "cpu" ? difficultyNames[difficultySelect.value] : "-";
        summaryBlocked.textContent = blocked;
        summaryChaos.textContent = chaosInput.checked ? "카오스 카드" : "꺼짐";
        chaosHelpText.textContent = chaosAvailable
          ? "숨겨진 초능력 1장과 특수돌 1장을 받고 시작합니다."
          : "온라인 대전은 특수돌 동기화가 붙은 뒤 열 예정입니다.";

        form.querySelector(".primary-action").disabled =
          onlineSelected && (!onlineAuthReady || !onlineUser);
        if (onlineSelected && !onlineAuthReady) {
          onlineHelpText.textContent = "온라인 로그인 상태를 확인하고 있습니다.";
        } else if (onlineSelected && !onlineUser) {
          onlineHelpText.textContent = "온라인 방을 만들거나 참가하려면 Google 로그인이 필요합니다.";
        } else {
          onlineHelpText.textContent = "빈칸으로 시작하면 새 방을 만들고, 코드를 입력하면 그 방에 참가합니다.";
        }
      }

      form.addEventListener("input", syncLobby);
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const mode = getFormValue("mode");
        const params = new URLSearchParams({
          mode,
          player: getFormValue("player"),
          difficulty: getFormValue("difficulty"),
          blocked: blockedInput.value,
        });
        if (mode === "online") {
          const roomCode = normalizeRoomCode(roomCodeInput.value);
          if (roomCode) {
            params.set("room", roomCode);
          } else {
            params.set("create", "1");
          }
        } else {
          params.set("chaos", chaosInput.checked ? "1" : "0");
        }
        window.location.href = `index.html?${params.toString()}`;
      });

      chaosGuideButton.addEventListener("click", () => {
        renderChaosGuide(activeGuideTab);
        if (typeof chaosGuideDialog.showModal === "function") {
          chaosGuideDialog.showModal();
        } else {
          chaosGuideDialog.setAttribute("open", "");
        }
      });

      chaosGuideCloseButton.addEventListener("click", () => {
        closeChaosGuide();
      });

      chaosGuideDialog.addEventListener("click", (event) => {
        if (event.target === chaosGuideDialog) {
          closeChaosGuide();
        }
      });

      guideTabButtons.forEach((button) => {
        button.addEventListener("click", () => {
          renderChaosGuide(button.dataset.guideTab);
        });
      });

      function renderChaosGuide(tab) {
        activeGuideTab = tab;
        const entries = chaosGuide[tab];
        const tabButton = guideTabButtons.find((button) => button.dataset.guideTab === tab);

        guideTabButtons.forEach((button) => {
          button.setAttribute("aria-selected", String(button === tabButton));
        });
        chaosGuideList.setAttribute("aria-labelledby", tabButton.id);
        chaosGuideList.innerHTML = "";

        for (const entry of entries) {
          const [name, effect, note] = Array.isArray(entry)
            ? entry
            : [entry.name, entry.effect, entry.note];
          const item = document.createElement("article");
          item.className = `chaos-guide-item${tab === "stones" || tab === "powers" ? " has-preview" : ""}`;

          if (tab === "powers") {
            item.append(createPowerPreview(entry));
          } else if (tab === "stones") {
            item.append(createStonePreview(entry));
          }

          const body = document.createElement("div");
          body.className = "chaos-guide-item-body";

          const title = document.createElement("strong");
          title.textContent = name;

          const effectText = document.createElement("p");
          effectText.textContent = effect;

          const noteText = document.createElement("span");
          noteText.textContent = note;

          body.append(title, effectText, noteText);
          item.append(body);
          chaosGuideList.append(item);
        }
      }

      function createPowerPreview(power) {
        const preview = document.createElement("div");
        preview.className = `power-guide-preview cell effect-cell effect-${power.effectType} effect-source-${power.id}`;
        preview.dataset.accent = power.accent;
        preview.setAttribute("aria-hidden", "true");

        const effectVisual = document.createElement("span");
        effectVisual.className = "effect-visual";

        const grid = document.createElement("span");
        grid.className = "power-guide-grid";

        const glyph = document.createElement("span");
        glyph.className = "card-glyph power-guide-glyph";
        glyph.dataset.glyph = power.glyph;

        preview.append(grid, effectVisual, glyph);
        return preview;
      }

      function createStonePreview(stone) {
        const preview = document.createElement("div");
        preview.className = `stone-guide-preview cell effect-cell effect-${stone.id} effect-source-${stone.id}`;
        preview.setAttribute("aria-hidden", "true");

        const effectVisual = document.createElement("span");
        effectVisual.className = "effect-visual";

        const piece = document.createElement("span");
        piece.className = "piece black special";
        piece.dataset.kind = stone.id;
        piece.dataset.accent = stone.accent;

        const aura = document.createElement("span");
        aura.className = "piece-aura";

        const owner = document.createElement("span");
        owner.className = "piece-owner-mark";

        const glyph = document.createElement("span");
        glyph.className = "piece-glyph";
        glyph.dataset.glyph = stone.glyph;

        piece.append(aura, owner, glyph);
        preview.append(effectVisual, piece);
        return preview;
      }

      function closeChaosGuide() {
        if (typeof chaosGuideDialog.close === "function") {
          chaosGuideDialog.close();
          return;
        }
        chaosGuideDialog.removeAttribute("open");
      }

      async function setupOnlineAuth() {
        try {
          const { getCurrentUser, onAuthStateChanged, signInWithGoogle } = await import(
            "../../shared/backend/authApi.js"
          );

          onlineAuthReady = true;

          const applyAuthUser = (user) => {
            onlineUser = user && !user.isAnonymous ? user : null;
            onlineAuthText.textContent = onlineUser ? "온라인 로그인됨" : "온라인 로그인 필요";
            onlineLoginButton.hidden = Boolean(onlineUser);
            syncLobby();
          };

          applyAuthUser(getCurrentUser());
          onAuthStateChanged(applyAuthUser);

          onlineLoginButton.addEventListener("click", async () => {
            onlineLoginButton.disabled = true;
            onlineAuthText.textContent = "로그인 중";
            try {
              await signInWithGoogle();
            } catch (error) {
              console.error("[Reversi] Google 로그인 실패:", error);
              onlineAuthText.textContent =
                error.code === "auth/popup-closed-by-user" ? "로그인 취소됨" : "로그인 실패";
            } finally {
              onlineLoginButton.disabled = false;
            }
          });
        } catch (error) {
          console.warn("[Reversi] 온라인 로그인 모듈 로드 실패:", error);
          onlineAuthReady = true;
          onlineUser = null;
          onlineAuthText.textContent = "온라인 로그인 사용 불가";
          onlineLoginButton.hidden = true;
          syncLobby();
        }
      }

      function renderLeaderboard(entries) {
        leaderboardList.innerHTML = "";

        if (!entries.length) {
          leaderboardList.innerHTML = "<li>아직 저장된 승리가 없습니다.</li>";
          return;
        }

        for (const entry of entries) {
          const item = document.createElement("li");
          const payload = entry.payload ?? {};
          const difficulty = difficultyNames[payload.difficulty] ?? "난이도";
          const margin = Number.isFinite(payload.margin) ? `+${payload.margin}` : "";
          const name = document.createElement("strong");
          const detail = document.createElement("span");

          name.textContent = `${entry.rank}. ${entry.publicName ?? entry.displayName ?? "플레이어"}`;
          detail.textContent = `${entry.sortValue}점 · ${difficulty} ${margin}`;
          item.append(name, detail);
          leaderboardList.append(item);
        }
      }

      async function loadLeaderboard() {
        try {
          const { getLeaderboard } = await import("../../shared/backend/leaderboardApi.js");
          const entries = await getLeaderboard({
            gameId: GAME_ID,
            leaderboardId: LEADERBOARD_ID,
            order: "desc",
            limitCount: 5,
          });
          leaderboardStatus.textContent = "상위 5명";
          renderLeaderboard(entries);
        } catch (error) {
          console.warn("[Reversi] 리더보드 로드 실패:", error);
          leaderboardStatus.textContent = "오프라인";
          leaderboardList.innerHTML = "<li>리더보드를 불러올 수 없습니다.</li>";
        }
      }

      syncLobby();
      renderChaosGuide(activeGuideTab);
      setupOnlineAuth();
      loadLeaderboard();
    </script>
  </body>
</html>
